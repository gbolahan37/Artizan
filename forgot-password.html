<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset password — Artizan Lagos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="stylesheet" href="assets/css/auth.css"/>
  <style>
    .fp-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; background: var(--ink-50); }
    .fp-card { background: #fff; border-radius: var(--radius-xl); padding: 48px 40px; max-width: 440px; width: 100%; box-shadow: var(--shadow-lg); text-align: center; }
    .fp-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--brand-purple-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.6rem; color: var(--brand-purple); }
    .fp-title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; color: var(--ink-900); }
    .fp-sub { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.6; }
    .fp-field { text-align: left; margin-bottom: 16px; }
    .fp-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--ink-700); margin-bottom: 6px; }
    .fp-input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-md); font-family: var(--font-body); font-size: 0.95rem; color: var(--text-primary); background: var(--ink-50); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .fp-input:focus { border-color: var(--brand-purple); background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .fp-btn { width: 100%; padding: 14px; background: var(--brand-purple); color: #fff; border: none; border-radius: var(--radius-full); font-family: var(--font-body); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .fp-btn:hover { background: var(--brand-purple-dark); transform: translateY(-1px); }
    .fp-btn:disabled { background: var(--ink-300); cursor: default; transform: none; }
    .fp-error { font-size: 0.82rem; color: #DC2626; margin-top: 8px; min-height: 18px; text-align: left; }
    .fp-back { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--brand-purple); text-decoration: none; font-weight: 500; margin-top: 20px; }
    .fp-back:hover { text-decoration: underline; }
    .fp-success { display: none; }
    .fp-success .fp-icon { background: var(--brand-green-light); color: var(--brand-green); }
    .fp-success .fp-title { color: var(--brand-green); }
  </style>
</head>
<body>
<div class="fp-wrap">
  <div class="fp-card">

    <!-- Step 1: Enter email -->
    <div id="fp-step1">
      <div class="fp-icon"><i class="fa fa-lock"></i></div>
      <h1 class="fp-title">Forgot password?</h1>
      <p class="fp-sub">Enter the email address linked to your Artizan account and we will send you a reset link.</p>

      <div class="fp-field">
        <label for="fp-email" class="fp-label">Email address</label>
        <input type="email" id="fp-email" class="fp-input" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="fp-error" id="fp-error"></div>
      <button class="fp-btn" id="fp-submit">
        <i class="fa fa-paper-plane"></i> Send reset link
      </button>
      <br/>
      <a href="customer-login.html" class="fp-back"><i class="fa fa-arrow-left"></i> Back to login</a>
    </div>

    <!-- Step 2: Success state -->
    <div id="fp-step2" class="fp-success">
      <div class="fp-icon"><i class="fa fa-circle-check"></i></div>
      <h1 class="fp-title">Check your email</h1>
      <p class="fp-sub">We sent a password reset link to <strong id="fp-sent-email"></strong>. It will expire in 30 minutes.</p>
      <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:20px">Didn't get it? Check your spam folder or <button id="fp-resend" style="background:none;border:none;color:var(--brand-purple);font-weight:600;cursor:pointer;font-size:0.82rem;font-family:inherit">resend the email</button>.</p>
      <a href="customer-login.html" class="fp-back"><i class="fa fa-arrow-left"></i> Back to login</a>
    </div>

  </div>
</div>

<script>
document.getElementById('fp-submit').addEventListener('click', async () => {
  const emailInput = document.getElementById('fp-email');
  const errorEl    = document.getElementById('fp-error');
  const btn        = document.getElementById('fp-submit');
  const email      = emailInput.value.trim();

  errorEl.textContent = '';
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errorEl.textContent = 'Please enter a valid email address.';
    emailInput.focus();
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Sending…';

  // Simulate API call (replace with real API.requestPasswordReset(email))
  await new Promise(r => setTimeout(r, 1400));

  document.getElementById('fp-step1').style.display = 'none';
  const step2 = document.getElementById('fp-step2');
  step2.style.display = 'block';
  document.getElementById('fp-sent-email').textContent = email;
});

document.getElementById('fp-resend').addEventListener('click', () => {
  document.getElementById('fp-resend').textContent = 'Email resent!';
  document.getElementById('fp-resend').style.color = 'var(--brand-green)';
  setTimeout(() => {
    document.getElementById('fp-resend').textContent = 'resend the email';
    document.getElementById('fp-resend').style.color = '';
  }, 3000);
});

document.getElementById('fp-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('fp-submit').click();
});
</script>
</body>
</html>
